<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>elyxie — un santuario que se lleva puesto</title>
  <link rel="icon" href="assets/elyxie-mark.svg"/>

  <!-- Performance hints: open TCP+TLS to every cross-origin we touch on the
       critical path BEFORE the parser hits the requests below. Cuts ~100-300 ms
       off first-byte for each origin (handshake amortised across requests). -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <!-- Tell the browser to start fetching the heavy 3D model immediately,
       in parallel with the rest of the critical path, so it's already in
       cache by the time pendant.jsx asks for it. -->
  <link rel="preload" as="fetch" href="assets/models/angel.glb" crossorigin>

  <!-- Fonts: parallel <link> loads instead of nested @import inside
       colors_and_type.css. Trimmed to ONLY the weights actually used:
         • Cormorant Garamond — 300, 400, 500 + italic 300, 400
         • Satoshi            — 300, 400, 500
       Fustat and JetBrains Mono dropped (never used / system mono works).
       display=swap shows a fallback immediately and swaps when ready, so
       the page is never blocked by font network. -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"/>
  <link rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500&display=swap"/>

  <link rel="stylesheet" href="assets/colors_and_type.css?v=102"/>
  <link rel="stylesheet" href="styles.css?v=102"/>

  <!-- Inline splash so the user sees the brand instantly while JS loads.
       Removed by the IIFE at the bottom of <body> once React mounts. Uses
       pure CSS — no JS needed to appear. Mirrors phase 01 of the hero:
       dark emerald vignette + lowercase italic wordmark glowing in gold.
       Falls back to Georgia until Cormorant Garamond italic 300 swaps in
       (display=swap) — the gradient and tagline carry the brand feel even
       during the FOUT window. -->
  <style>
    #__splash {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 50% 50%,
          rgba(38, 96, 100, 0.45) 0%,
          rgba(12, 36, 44, 0.85) 38%,
          rgba(2, 10, 14, 0.98) 72%,
          rgba(0, 4, 6, 1.00) 95%),
        #051613;
      color: #E9D7B1;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 33.6px;
      z-index: 9999;
      font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif;
      transition: opacity 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #__splash[data-hidden="true"] { opacity: 0; pointer-events: none; }
    #__splash .__sp-mark {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(77px, 9.6vw, 115px);
      letter-spacing: -0.02em;
      line-height: 1;
      color: #E9D7B1;
      text-shadow: 0 0 40px rgba(233, 215, 177, 0.25);
      animation: __sp-breathe 4s ease-in-out infinite;
    }
    #__splash .__sp-tag {
      font-family: "Satoshi", "Inter", system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(233, 215, 177, 0.5);
    }
    /* Loading bar. CRITICAL: the angel GLB decode + WebGL shader compile +
       env-map generation block the MAIN THREAD for several seconds in long
       synchronous chunks. Any JS-driven counter (requestAnimationFrame) is
       starved during those blocks and therefore stutters / snaps. So the bar
       is animated with `transform: scaleX()`, which the browser runs on the
       COMPOSITOR thread — it keeps gliding smoothly even while the main
       thread is frozen building the scene. A live numeric digit can't be kept
       smooth this way (text repaint is main-thread), so we intentionally use
       a wordless bar instead of a 0–100 number. */
    #__splash .__sp-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 19.2px;
      margin-top: 14.4px;
    }
    #__splash .__sp-track {
      width: 264px;
      max-width: 72vw;
      height: 1.2px;
      background: rgba(233, 215, 177, 0.16);
      overflow: hidden;
    }
    #__splash .__sp-fill {
      width: 100%;
      height: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg,
        rgba(201, 166, 107, 0.7) 0%,
        #E9D7B1 100%);
      box-shadow: 0 0 12px rgba(233, 215, 177, 0.5);
      /* Bulk of the travel happens in the first ~3.5s, then it crawls slowly
         toward 0.97 so it never visually stalls while the model finishes —
         JS completes it to scaleX(1) on `angel-ready`. */
      animation: __sp-fill-grow 9000ms linear forwards;
    }
    @keyframes __sp-fill-grow {
      0%   { transform: scaleX(0); }
      40%  { transform: scaleX(0.78); }
      100% { transform: scaleX(0.97); }
    }
    @keyframes __sp-breathe {
      0%, 100% { opacity: 0.85; text-shadow: 0 0 30px rgba(233, 215, 177, 0.20); }
      50%      { opacity: 1.00; text-shadow: 0 0 60px rgba(233, 215, 177, 0.40); }
    }
    @media (prefers-reduced-motion: reduce) {
      #__splash .__sp-mark { animation: none; }
      #__splash .__sp-fill { animation-duration: 600ms; }
    }
  </style>
</head>
<body data-theme="dark">
  <div id="__splash" aria-hidden="true">
    <span class="__sp-mark">elyxie</span>
    <span class="__sp-tag">Sacred Waters</span>
    <div class="__sp-loader" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Cargando">
      <div class="__sp-track"><div class="__sp-fill" id="__sp-fill"></div></div>
    </div>
  </div>
  <div id="root"></div>

  <!-- Importmap for three/addons consumed by the loader preamble below -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Three.js + GLB loaders preamble. Exposes them on window and dispatches
       a "three-ready" event when done. pendant.jsx (classic) listens for it. -->
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
    import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
    import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
    window.THREE = THREE;
    window.GLTFLoader = GLTFLoader;
    window.DRACOLoader = DRACOLoader;
    window.KTX2Loader = KTX2Loader;
    window.MeshoptDecoder = MeshoptDecoder;
    window.mergeVerticesFn = mergeVertices;
    window.__threeReady = true;
    window.dispatchEvent(new Event('three-ready'));
  </script>

  <!-- React PRODUCTION build (was .development.js → 5-10× slower, 3× larger). -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous" defer></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" defer></script>

  <!-- App code: pre-compiled by build.js (`npm run build` / `npm run watch`).
       Was: <script type="text/babel" src="*.jsx"> + @babel/standalone CDN.
       Babel was downloading ~800 KB gzipped and blocking the main thread
       300-1500 ms while it transpiled the JSX at load time. The pre-compiled
       .js files run immediately and total ~65 KB. `defer` keeps them in
       document order, executes after parsing, and doesn't block the parser. -->
  <script src="dist/tweaks-panel.js?v=102" defer></script>
  <script src="dist/pendant.js?v=102" defer></script>
  <script src="dist/sections.js?v=102" defer></script>
  <script src="dist/app.js?v=102" defer></script>

  <!-- Loader controller. The splash stays up until the angel GLB is genuinely
       loaded AND painted: pendant.js fires `angel-ready` once the model has
       been rendered for a frame. The visible fill bar is animated entirely in
       CSS via `transform: scaleX()` (compositor thread) so it glides smoothly
       even while the main thread is frozen decoding the GLB / compiling
       shaders. This script does almost nothing during load — it only listens
       for `angel-ready`, then glides the bar to full and fades the splash, so
       the page is never revealed before the angel is on screen. -->
  <script>
    (function () {
      const splash = document.getElementById('__splash');
      if (!splash) return;
      const fill = document.getElementById('__sp-fill');
      let done = false;

      function complete() {
        if (done) return;
        done = true;
        if (fill) {
          // Freeze the compositor keyframe at wherever it currently is, then
          // glide the remaining distance to full — a continuous motion, never
          // a snap, regardless of how far the keyframe had travelled.
          const cs = getComputedStyle(fill).transform;
          fill.style.animation = 'none';
          fill.style.transform = (cs && cs !== 'none') ? cs : 'scaleX(0)';
          requestAnimationFrame(function () {
            fill.style.transition = 'transform 480ms cubic-bezier(0.4, 0, 0.2, 1)';
            fill.style.transform = 'scaleX(1)';
          });
        }
        // Let the bar top out, then fade + remove the splash.
        setTimeout(function () {
          splash.dataset.hidden = 'true';
          setTimeout(function () { splash.remove(); }, 700);
        }, 520);
      }

      if (window.__angelReady) complete();
      else window.addEventListener('angel-ready', complete);

      // Safety valve: if angel-ready never arrives (catastrophic load failure
      // with no error event), release after 30 s so the page isn't stuck.
      setTimeout(complete, 30000);
    })();
  </script>
</body>
</html>
