<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>elyxie — un santuario que se lleva puesto</title>
  <link rel="icon" href="assets/elyxie-mark.svg"/>

  <!-- Performance hints: open TCP+TLS to every cross-origin we touch on the
       critical path BEFORE the parser hits the requests below. Cuts ~100-300 ms
       off first-byte for each origin (handshake amortised across requests). -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <!-- Tell the browser to start fetching the heavy 3D model immediately,
       in parallel with the rest of the critical path, so it's already in
       cache by the time pendant.jsx asks for it. -->
  <link rel="preload" as="fetch" href="assets/models/angel.glb" crossorigin>

  <!-- Fonts: parallel <link> loads instead of nested @import inside
       colors_and_type.css. Trimmed to ONLY the weights actually used:
         • Cormorant Garamond — 300, 400, 500 + italic 300, 400
         • Satoshi            — 300, 400, 500
       Fustat and JetBrains Mono dropped (never used / system mono works).
       display=swap shows a fallback immediately and swaps when ready, so
       the page is never blocked by font network. -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"/>
  <link rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500&display=swap"/>

  <link rel="stylesheet" href="assets/colors_and_type.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <!-- Importmap for three/addons consumed by the loader preamble below -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Three.js + GLB loaders preamble. Exposes them on window and dispatches
       a "three-ready" event when done. pendant.jsx (classic) listens for it. -->
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
    import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
    import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
    window.THREE = THREE;
    window.GLTFLoader = GLTFLoader;
    window.DRACOLoader = DRACOLoader;
    window.KTX2Loader = KTX2Loader;
    window.MeshoptDecoder = MeshoptDecoder;
    window.mergeVerticesFn = mergeVertices;
    window.__threeReady = true;
    window.dispatchEvent(new Event('three-ready'));
  </script>

  <!-- React PRODUCTION build (was .development.js → 5-10× slower, 3× larger). -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous" defer></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" defer></script>

  <!-- App code: pre-compiled by build.js (`npm run build` / `npm run watch`).
       Was: <script type="text/babel" src="*.jsx"> + @babel/standalone CDN.
       Babel was downloading ~800 KB gzipped and blocking the main thread
       300-1500 ms while it transpiled the JSX at load time. The pre-compiled
       .js files run immediately and total ~65 KB. `defer` keeps them in
       document order, executes after parsing, and doesn't block the parser. -->
  <script src="dist/tweaks-panel.js" defer></script>
  <script src="dist/pendant.js" defer></script>
  <script src="dist/sections.js" defer></script>
  <script src="dist/app.js" defer></script>
</body>
</html>
