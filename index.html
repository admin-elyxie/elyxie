<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>elyxie — un santuario que se lleva puesto</title>
  <link rel="icon" href="assets/elyxie-mark.svg"/>
  <link rel="stylesheet" href="assets/colors_and_type.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <!-- Importmap for three/addons consumed by the loader preamble below -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Three.js + GLB loaders preamble. Exposes them on window and dispatches
       a "three-ready" event when done. pendant.jsx (classic) listens for it. -->
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
    import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
    import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
    window.THREE = THREE;
    window.GLTFLoader = GLTFLoader;
    window.DRACOLoader = DRACOLoader;
    window.KTX2Loader = KTX2Loader;
    window.MeshoptDecoder = MeshoptDecoder;
    window.mergeVerticesFn = mergeVertices;
    window.__threeReady = true;
    window.dispatchEvent(new Event('three-ready'));
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.27.4/babel.min.js" crossorigin="anonymous"></script>

  <!-- Tweaks panel starter (provides TweaksPanel, TweakSection, TweakSlider, TweakColor, useTweaks) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Pendant 3D scene (classic; uses window.THREE etc. populated by the preamble) -->
  <script type="text/babel" src="pendant.jsx"></script>

  <!-- Sections 2-7 -->
  <script type="text/babel" src="sections.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
